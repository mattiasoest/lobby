name: Rollback server

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to roll back to (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mattiasoest/lobby-server

jobs:
  rollback-server:
    name: Promote ${{ inputs.tag }} to latest
    runs-on: ubuntu-latest
    steps:
      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v ]]; then
            echo "Tag must start with 'v' (e.g. v1.0.0)"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify source image exists
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ inputs.tag }}

      - name: Retag as latest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${{ inputs.tag }}

      - name: Summary
        run: |
          echo "Promoted ${{ env.IMAGE_NAME }}:${{ inputs.tag }} to :latest"
          echo "Watchtower should pull and restart the server within ~2 minutes."
